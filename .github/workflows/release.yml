# ============================================================
#  OCRtoODT — GitHub Actions Release Workflow
#  File: .github/workflows/release.yml
#
#  Responsibility:
#      - Build Release binary on tag push (v*)
#      - Use SYSTEM dependencies (Qt6 + Poppler-Qt6 + OpenCV + Tesseract)
#      - Upload built executable as workflow artifact
#
# ============================================================

name: Build AppImage Release

on:
  push:
    tags:
      - 'v*'
      
permissions:
  contents: write
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches CMake version
        run: |
          TAG="${GITHUB_REF_NAME}"      # e.g. v3.0.2
          VER_TAG="${TAG#v}"

          VER_CMAKE="$(perl -ne 'print "$1\n" if /project\s*\(\s*OCRtoODT\s+VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)/i' CMakeLists.txt | head -n1)"

          echo "Tag version   : $VER_TAG"
          echo "CMake version : $VER_CMAKE"

          if [ "$VER_TAG" != "$VER_CMAKE" ]; then
            echo "ERROR: Tag version does not match CMakeLists.txt"
            exit 1
          fi

      # ------------------------------------------------------------
      # Install dependencies
      # ------------------------------------------------------------
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            cmake \
            ninja-build \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-multimedia-dev \
            qt6-svg-dev \
            libpoppler-qt6-dev \
            libopencv-dev \
            libtesseract-dev \
            libleptonica-dev \
            libxkbcommon-dev \
            wget \
            file \
            fuse \
            patchelf

      # ------------------------------------------------------------
      # Configure + Build
      # ------------------------------------------------------------
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build

      # ------------------------------------------------------------
      # Install into AppDir
      # ------------------------------------------------------------
      - name: Install into AppDir
        run: |
          cmake --install build --prefix AppDir/usr

      # ------------------------------------------------------------
      # Download linuxdeploy
      # ------------------------------------------------------------
      - name: Download linuxdeploy
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

      # ------------------------------------------------------------
      # Build AppImage
      # ------------------------------------------------------------
      - name: Create AppImage
        env:
          QMAKE: /usr/lib/qt6/bin/qmake
        run: |
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable AppDir/usr/bin/OCRtoODT \
            --desktop-file AppDir/usr/share/applications/OCRtoODT.desktop \
            --icon-file resources/icons/ocrtoodt.png \
            --plugin qt \
            --output appimage

      # ------------------------------------------------------------
      # Rename AppImage with version
      # ------------------------------------------------------------
      - name: Rename AppImage with version
        run: |
          VER="${GITHUB_REF_NAME#v}"   # tag "vX.Y.Z" -> "X.Y.Z"
          mv "OCRtoODT-x86_64.AppImage" "OCRtoODT-v${VER}-x86_64.AppImage"

      # ------------------------------------------------------------
      # Generate SHA256SUMS
      # ------------------------------------------------------------
      - name: Generate SHA256SUMS
        run: |
          sha256sum OCRtoODT-v*-x86_64.AppImage > SHA256SUMS
          echo "Generated SHA256SUMS:"
          cat SHA256SUMS

      # ------------------------------------------------------------
      # Upload Release Asset(s)
      # ------------------------------------------------------------
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OCRtoODT-v*-x86_64.AppImage
            SHA256SUMS
          fail_on_unmatched_files: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

